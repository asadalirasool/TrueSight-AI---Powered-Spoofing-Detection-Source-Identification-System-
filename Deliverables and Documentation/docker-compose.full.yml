version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: truesight-postgres
    environment:
      POSTGRES_DB: truesight
      POSTGRES_USER: truesight_user
      POSTGRES_PASSWORD: truesight_pass_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - truesight-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: truesight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - truesight-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # API Server
  api:
    build: .
    container_name: truesight-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://truesight_user:truesight_pass_123@postgres:5432/truesight
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=False
    depends_on:
      - postgres
      - redis
    networks:
      - truesight-network
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models

  # Frontend Server
  frontend:
    image: nginx:alpine
    container_name: truesight-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - truesight-network
    restart: unless-stopped
    depends_on:
      - api

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:v2.40.0
    container_name: truesight-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - truesight-network
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:9.3.0
    container_name: truesight-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - truesight-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  truesight-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: